name: Release check (full)

# Heavy-duty validation: Python matrix, clean-venv wheel install,
# packaging tests against the installed wheel, and a full-stack
# Docker integration smoke. Runs:
#
#   * On tag push v*.*.* (the actual moment of cutting a release)
#   * On manual dispatch (Actions tab -> Run workflow) when getting
#     ready to release and you want to validate before tagging.
#
# Not in the per-PR loop because a typical change doesn't justify
# the 8-10 minute Docker bring-up cost.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-matrix:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

  wheel-install:
    name: Build + install wheel in clean venv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build + twine
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Lint distribution metadata
        run: twine check dist/*

      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/pip install dist/*.whl
          /tmp/wheel-test/bin/pip install pytest

      - name: Run packaging tests against the installed wheel
        run: /tmp/wheel-test/bin/pytest tests/test_packaging.py -v

      - name: CLI smoke
        run: |
          /tmp/wheel-test/bin/sandcastle-sim --version
          /tmp/wheel-test/bin/sandcastle-sim --help > /dev/null
          /tmp/wheel-test/bin/sandcastle-sim status

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  full-stack:
    name: Full-stack Docker integration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Docker is available
        run: docker --version && docker compose version

      - name: Bring up the stack
        run: sandcastle-sim start
        timeout-minutes: 5

      - name: Confirm everything is reachable
        run: |
          sandcastle-sim status
          python <<'EOF'
          import socket, sys
          failures = []
          for port in (1883, 8123, 8765, 8766):
              s = socket.socket()
              s.settimeout(2)
              try:
                  s.connect(("127.0.0.1", port))
                  print(f"  port {port} OK")
              except Exception as e:
                  failures.append((port, e))
              finally:
                  s.close()
          if failures:
              for port, exc in failures:
                  print(f"  port {port} DOWN: {exc}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: MCP smoke test (discovery + control round-trip)
        run: python scripts/smoketest_mcp.py

      - name: Per-family integration tests (one round-trip per device family)
        run: pytest tests/test_integration_smoke.py -v -m integration

      - name: Tear down
        if: always()
        run: sandcastle-sim stop || true

      - name: Upload component logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandcastle-logs
          path: |
            .sandcastle/*.log
          retention-days: 7
          if-no-files-found: ignore
